<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJPEG Stream Viewer</title>
</head>
<body>
    <h1>MJPEG Stream Viewer</h1>
    <img src="http://localhost:8080" alt="MJPEG Stream" id="mjpeg-stream">
    <script>
        const img = document.getElementById('mjpeg-stream');
        const refreshInterval = 5000; // Refresh every 5 seconds

        setInterval(() => {
            const timestamp = new Date().getTime();
            img.src = `http://localhost:8080?timestamp=${timestamp}`;
        }, refreshInterval);
    </script>
</body>
</html>
